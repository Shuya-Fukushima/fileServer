openapi: "3.0.3"

info:
  title: "File Server API"
  version: "1.0.0"
  description: |
    このAPIはFileServerへのアクセスを提供する。

    ## 🎨 設計思想 (Design Philosophy)
    本APIは一つのディレクトリに対する操作を原則としています。  
    常に親ディレクトリが一意であって、その配下にあるファイル・ディレクトリへの操作を提供しています。  
    ※  
    閉じた環境で動作することを前提としています。  
    そのため、セキュリティは考慮しないものとして設計されています。  
    ただし、実験的に内部のインクリメンタルなIDを流出させない試みとして、  
    外部とのやり取りは基本的にUUIDを使用します。  

    ## 🛠 設計方針 (Design Principles)
    - **ステートレス性**: サーバー側でセッション状態を保持しません。
    - **冪等性の担保**: PUTおよびDELETEメソッドは、複数回実行しても結果が変わらないよう設計されています。
    - **レスポンス形式**: 全てJSON形式で返却され、日付データは `ISO 8601` 形式を採用します。
  contact:
    name: shikumafu
    email: shikumafu@gmail.com

servers:
  - url: "https://api.example.com/v1222" # APIをホストしているサーバーのURL
    description: 本番環境サーバー # このサーバーに関する追加情報
  - url: "http://localhost:8080/api" # ローカル開発用のサーバーURL
    description: 開発環境サーバー # この開発サーバーに関する追加情報

paths:
  "/items":
    get:
      summary: ファイル一覧取得
      description: 指定されたフォルダ配下のファイル一覧を取得します。
      parameters:
        - name: folderId
          in: query
          description: 取得対象のフォルダID（未指定時はルート）
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'

  /folders:
    post:
      summary: フォルダ作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "新規フォルダ"
                parentId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: 作成完了
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicId:
                    type: string
                    format: uuid
                  name:
                    type: string
                  physicalName:
                    type: string

