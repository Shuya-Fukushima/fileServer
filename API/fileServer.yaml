  /uploads/{publicId}:
    post:
      summary: ファイル/フォルダのアップロード (A-04)
      parameters:
        - name: publicId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: array
              items:
                files:
                  type: string
                  format: binary
      responses:
        '201':
          description: アップロード成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    example: false
                  failList:
                    type: array
                    items:
                      type: string
                      example: upload_fail.txt

