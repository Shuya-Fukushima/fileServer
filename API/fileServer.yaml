components:
  schemas:
    Item:
      type: object
      properties:
        fileId:
          type: string
        publicId:
          type: string
          format: uuid
        typeCode:
          type: string
          enum: [F, D]
        name:
          type: string
        physicalName:
          type: string
        createAt:
          type: string
          format: date-time