spring.application.name=fileServer

# ===============================
# 1. PostgreSQL 接続設定
# ===============================
spring.datasource.url=jdbc:postgresql://shiku-Green:5432/filedb
spring.datasource.username=file_server
spring.datasource.password=file2026
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate 設定
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# 2. ファイルアップロード制限
# ===============================
# 1ファイルあたりの最大サイズ
spring.servlet.multipart.max-file-size=10MB
# 1リクエスト（複数ファイル含む）あたりの最大サイズ
spring.servlet.multipart.max-request-size=1000MB

# ===============================
# 3. ファイル管理用カスタム設定
# ===============================
# 保存先ディレクトリパス（プロジェクト外のパスを推奨）
# Windows例: C:/uploads / Mac・Linux例: /Users/name/uploads
file.upload-dir=C:/uploads